<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="StudyConnect — Learn Together. Grow Together. Gamified peer-learning community and collaborative study platform.">
    
    <!-- Favicon & App Branding -->
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='img/logo/favicon.ico') }}">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='img/logo/favicon-32x32.png') }}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='img/logo/favicon-16x16.png') }}">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='img/logo/apple-touch-icon.png') }}">
    
    <!-- Social Sharing & Open Graph -->
    <meta property="og:title" content="StudyConnect — Learn Together. Grow Together.">
    <meta property="og:description" content="A gamified peer-learning community, collaborative study rooms, and real-time networking platform.">
    <meta property="og:image" content="{{ url_for('static', filename='img/logo/logo-uploaded.png', _external=True) }}">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="StudyConnect — Learn Together. Grow Together.">
    <meta name="twitter:description" content="Join StudyConnect to ask doubts, earn points, and discover peers studying nearby.">
    <meta name="twitter:image" content="{{ url_for('static', filename='img/logo/logo-uploaded.png', _external=True) }}">

    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>{% block title %}StudyConnect{% endblock %}</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="app-layout-container">
        {% include '_partials/_navbar.html' %}

        <!-- Flash Messages -->
        {% include '_partials/_flash_messages.html' %}

        <!-- Toast Container -->
        <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 9999;"></div>

        <!-- Main Content -->
        <main class="main-content">
            {% block content %}{% endblock %}
        </main>

        {% include '_partials/_footer.html' %}
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>

    {% block extra_js %}{% endblock %}
</body>
</html>
