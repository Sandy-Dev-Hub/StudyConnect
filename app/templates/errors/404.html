{% extends 'base.html' %}
{% block title %}404 — Page Not Found{% endblock %}

{% block content %}
<section class="error-section">
    <div class="container text-center">
        <div class="error-content animate-fade-in-up">
            <div class="mb-4">
                <img src="{{ url_for('static', filename='img/logo/logo-icon.svg') }}" height="64" alt="StudyConnect">
            </div>
            <div class="error-code gradient-text">404</div>
            <h2 class="error-title">Page Not Found</h2>
            <p class="error-message text-muted">
                The page you're looking for doesn't exist or has been moved.
            </p>
            <div class="error-actions">
                <a href="{{ url_for('main.home') }}" class="btn btn-glow btn-lg me-2">
                    <i class="bi bi-house me-2"></i>Go Home
                </a>
                <a href="{{ url_for('questions.feed') }}" class="btn btn-glass btn-lg">
                    <i class="bi bi-chat-square-text me-2"></i>Browse Questions
                </a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
