{% extends 'base.html' %}
{% block title %}403 — Forbidden{% endblock %}

{% block content %}
<section class="error-section">
    <div class="container text-center">
        <div class="error-content animate-fade-in-up">
            <div class="mb-4">
                <img src="{{ url_for('static', filename='img/logo/logo-icon.svg') }}" height="64" alt="StudyConnect">
            </div>
            <div class="error-code gradient-text">403</div>
            <h2 class="error-title">Access Denied</h2>
            <p class="error-message text-muted">
                You don't have permission to access this resource.
            </p>
            <div class="error-actions">
                <a href="{{ url_for('main.home') }}" class="btn btn-glow btn-lg me-2">
                    <i class="bi bi-house me-2"></i>Go Home
                </a>
                <a href="javascript:history.back()" class="btn btn-glass btn-lg">
                    <i class="bi bi-arrow-left me-2"></i>Go Back
                </a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
